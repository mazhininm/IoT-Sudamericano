<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación DHT11 ESP32</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #0f172a; 
            color: white; 
        }
        h1 { 
            margin-top: 40px; 
            color: #38bdf8; 
        }
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
            margin-top: 40px; 
        }
        .card { 
            padding: 20px; 
            background: #1e293b; 
            border-radius: 12px; 
            width: 220px; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .valor { 
            font-size: 40px; 
            margin-top: 10px; 
            font-weight: bold;
        }
        .unidad { 
            font-size: 20px; 
            color: #94a3b8; 
            font-weight: normal;
        }

        /* Estilos para la Barra de Temperatura */
        .barra-contenedor {
            width: 100%;
            height: 12px;
            background-color: #334155;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }
        .barra-relleno {
            height: 100%;
            width: 0%; /* Empieza en 0 */
            background-color: blue; 
            transition: width 0.8s ease, background-color 0.8s ease;
        }

        /* Estilos para las Gotas de Humedad */
        .gotas-contenedor {
            margin-top: 15px;
            font-size: 18px; /* Tamaño de las gotas */
            display: flex;
            justify-content: space-between;
        }
        .gota {
            transition: filter 0.5s ease, opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <h1>Datos del Sensor DHT11</h1>
    
    <div class="container">
        <div class="card">
            <p>Temperatura</p>
            <div id="temp-val" class="valor">-- <span class="unidad">°C</span></div>
            <div class="barra-contenedor">
                <div id="temp-barra" class="barra-relleno"></div>
            </div>
        </div>
        
        <div class="card">
            <p>Humedad</p>
            <div id="hum-val" class="valor">-- <span class="unidad">%</span></div>
            <div id="hum-gotas" class="gotas-contenedor">
                </div>
        </div>
        
        <div class="card">
            <p>Índice de Calor</p>
            <div id="hic-val" class="valor">-- <span class="unidad">°C</span></div>
        </div>
    </div>

        // Modificamos fetchVariable para que devuelva el valor en lugar de imprimirlo directamente
        async function fetchVariable(nombreVariable) {
            try {
                const response = await fetch(`https://api.tago.io/data?variable=${nombreVariable}&query=last_value`, {
                    headers: { "Device-Token": TOKEN }
                });
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    return data.result[0].value;
                }
            } catch (error) {
                console.error(`Error obteniendo ${nombreVariable}:`, error);
            }
            return null; // Retorna null si falla
        }
