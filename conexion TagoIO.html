<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación DHT11 ESP32</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #0f172a; 
            color: white; 
        }
        h1 { 
            margin-top: 40px; 
            color: #38bdf8; 
        }
        /* Contenedor flexible para alinear las tarjetas */
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
            margin-top: 40px; 
        }
        .card { 
            padding: 20px; 
            background: #1e293b; 
            border-radius: 12px; 
            width: 200px; 
        }
        .valor { 
            font-size: 40px; 
            margin-top: 10px; 
        }
        .unidad { 
            font-size: 20px; 
            color: #94a3b8; 
        }
    </style>
</head>
<body>
    <h1>Datos del Sensor DHT11</h1>
    
    <div class="container">
        <div class="card">
            <p>Temperatura</p>
            <div id="temp-val" class="valor">-- <span class="unidad">°C</span></div>
        </div>
        
        <div class="card">
            <p>Humedad</p>
            <div id="hum-val" class="valor">-- <span class="unidad">%</span></div>
        </div>
        
        <div class="card">
            <p>Índice de Calor</p>
            <div id="hic-val" class="valor">-- <span class="unidad">°C</span></div>
        </div>
    </div>

    <script>
        // Tu token (El mismo que pusiste en el Arduino)
        const TOKEN = "159dc7fd-e27f-47bc-a747-8f56425fc767";

        // Función dinámica para obtener cualquier variable
        async function fetchVariable(nombreVariable, idElemento, unidad) {
            try {
                const response = await fetch(`https://api.tago.io/data?variable=${nombreVariable}&query=last_value`, {
                    headers: { "Device-Token": TOKEN }
                });
                const data = await response.json();
                
                // Si TagoIO devuelve datos, los actualizamos en el HTML
                if (data.result && data.result.length > 0) {
                    document.getElementById(idElemento).innerHTML = data.result[0].value + ` <span class="unidad">${unidad}</span>`;
                }
            } catch (error) {
                console.error(`Error obteniendo ${nombreVariable}:`, error);
            }
        }

        // Función principal que llama a las 3 variables
        function obtenerDatos() {
            fetchVariable("temperature", "temp-val", "°C");
            fetchVariable("humidity", "hum-val", "%");
            fetchVariable("hindex", "hic-val", "°C");
        }

        // El Arduino actualiza datos cada ~34 segundos en total. 
        // Consultar cada 10 segundos mantendrá la interfaz ágil sin saturar la red.
        setInterval(obtenerDatos, 10000); 
        
        // Ejecución inmediata al abrir la página
        obtenerDatos(); 
    </script>
</body>
</html>
