<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación DHT11 ESP32</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #0f172a; 
            color: white; 
        }
        h1 { 
            margin-top: 40px; 
            color: #38bdf8; 
        }
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
            margin-top: 40px; 
        }
        .card { 
            padding: 20px; 
            background: #1e293b; 
            border-radius: 12px; 
            width: 260px; /* Un poco más ancho para acomodar los gráficos */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .valor { 
            font-size: 40px; 
            margin-top: 10px; 
            font-weight: bold;
        }
        .unidad { 
            font-size: 20px; 
            color: #94a3b8; 
            font-weight: normal;
        }

        /* --- Estilos para la Barra de Temperatura --- */
        .bar-bg {
            background-color: #334155;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin-top: 15px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .temp-fill {
            height: 100%;
            width: 0%; /* Inicia en 0, JS lo cambia */
            background-color: blue; /* Color base, JS lo cambia */
            border-radius: 10px;
            transition: width 0.5s ease-out, background-color 0.5s ease-out;
        }

        /* --- Estilos para las Gotas de Humedad --- */
        .drops-container {
            margin-top: 15px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
        }
        .drop {
            opacity: 0.2; /* Gotas apagadas por defecto */
            transition: opacity 0.3s ease-in-out;
            filter: grayscale(100%);
        }
        .drop.active {
            opacity: 1; /* Gotas encendidas */
            filter: grayscale(0%);
        }
    </style>
</head>
<body>
    <h1>Datos del Sensor DHT11</h1>
    
    <div class="container">
        <div class="card">
            <p>🌡️ Temperatura</p>
            <div id="temp-val" class="valor">-- <span class="unidad">°C</span></div>
            <div class="bar-bg">
                <div id="temp-fill" class="temp-fill"></div>
            </div>
        </div>
        
        <div class="card">
            <p>💧 Humedad</p>
            <div id="hum-val" class="valor">-- <span class="unidad">%</span></div>
            <div id="hum-drops" class="drops-container">
                </div>
        </div>
        
        <div class="card">
            <p>🔥 Índice de Calor</p>
            <div id="hic-val" class="valor">-- <span class="unidad">°C</span></div>
        </div>
    </div>

    <script>
        // Tu token de TagoIO
        const TOKEN = "159dc7fd-e27f-47bc-a747-8f56425fc767";

        async function fetchVariable(nombreVariable, idElemento, unidad) {
            try {
                const response = await fetch(`https://api.tago.io/data?variable=${nombreVariable}&query=last_value`, {
                    headers: { "Device-Token": TOKEN }
                });
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    let valor = parseFloat(data.result[0].value);
                    
                    // 1. Actualizar el texto numérico
                    document.getElementById(idElemento).innerHTML = valor.toFixed(1) + ` <span class="unidad">${unidad}</span>`;
                    
                    // 2. Lógicas visuales condicionales según la variable
                    if (nombreVariable === "temperature") {
                        // Consideramos el rango del DHT11 de 0°C a 50°C para la barra
                        let porcentaje = (valor / 50) * 100;
                        porcentaje = Math.max(0, Math.min(100, porcentaje)); // Limitar entre 0 y 100%
                        
                        // Calcular el color: 0°C = Azul (Hue 240), 40°C = Rojo (Hue 0)
                        let hue = 240 - (valor * 6); 
                        hue = Math.max(0, Math.min(240, hue)); // Limitar valores del espectro
                        
                        let barra = document.getElementById("temp-fill");
                        barra.style.width = porcentaje + "%";
                        barra.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
                    } 
                    else if (nombreVariable === "humidity") {
                        // Rango de humedad de 0% a 100%
                        // Dividimos entre 10 para saber cuántas de las 10 gotas encender
                        let gotasActivas = Math.round(valor / 10);
                        let htmlGotas = "";
                        
                        for (let i = 1; i <= 10; i++) {
                            // Si el ciclo es menor o igual a la cantidad calculada, se le da la clase 'active'
                            let estadoClase = (i <= gotasActivas) ? "active" : "";
                            htmlGotas += `<span class="drop ${estadoClase}">💧</span>`;
                        }
                        
                        document.getElementById("hum-drops").innerHTML = htmlGotas;
                    }
                }
            } catch (error) {
                console.error(`Error obteniendo ${nombreVariable}:`, error);
            }
        }

        function obtenerDatos() {
            fetchVariable("temperature", "temp-val", "°C");
            fetchVariable("humidity", "hum-val", "%");
            fetchVariable("hindex", "hic-val", "°C");
        }

        // Consultar a TagoIO cada 10 segundos
        setInterval(obtenerDatos, 10000); 
        obtenerDatos(); 
    </script>
</body>
</html>
